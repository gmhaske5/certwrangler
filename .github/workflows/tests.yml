name: tests

on:
  push:
    branches: ["main"]
    paths-ignore: ["docs/**", "README.md"]
  pull_request:
    branches: ["main"]
    paths-ignore: ["docs/**", "README.md"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: "Tox suite ${{ matrix.tox }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tox: "py3.13" }
          - { tox: "py3.12" }
          - { tox: "py3.11" }
          - { tox: "py3.10" }
          - { tox: "typing" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false
      - name: Run tox
        run: uv run --locked --no-default-groups --group tox tox -e ${{ matrix.tox }}
  # Taken from https://brunoscheufler.com/blog/2022-04-09-the-required-github-status-check-that-wasnt
  test-success:
    runs-on: ubuntu-latest
    name: "Tox Tests Successful"
    needs: test
    if: success() # only run when all tests have passed
    outputs:
      success: ${{ steps.setoutput.outputs.success }}
    steps:
      - id: setoutput
        run: echo "success=true" >> $GITHUB_OUTPUT
  test-rollup-result:
    runs-on: ubuntu-latest
    name: "Roll-up Tox Test Results"
    if: always() # always run, so we never skip the check
    needs: [test, test-success]
    steps:
      - run: |
          passed="${{ needs.test-success.outputs.success }}"
          if [[ $passed == "true" ]]; then
            echo "All tests passed"
            exit 0
          else
            echo "Tests failed"
            exit 1
          fi
